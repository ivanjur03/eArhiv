<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Prijava – e-Arhiv</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0d1b2e;
            background-image:
                radial-gradient(ellipse at 15% 25%, rgba(37,99,235,.45) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 75%, rgba(109,40,217,.35) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 10%, rgba(6,182,212,.2) 0%, transparent 50%);
        }
        .login-card { width: 100%; max-width: 420px; border-radius: 1rem; border: 1px solid rgba(255,255,255,.08); box-shadow: 0 8px 40px rgba(0,0,0,.5); background: rgba(255,255,255,.97); }
        .brand-text { font-size: 2rem; font-weight: 800; color: #1d4ed8; }
    </style>
</head>
<body>
<div class="login-card p-4 p-md-5">
    <div class="text-center mb-4">
        <div class="brand-text">e-Arhiv</div>
        <p class="text-muted small mb-0">Digitalna arhiva e-računa</p>
    </div>
    <div class="alert alert-danger py-2" th:if="${param.error}">
        Neispravno korisničko ime ili lozinka.
    </div>
    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold" for="username">Korisničko ime</label>
            <input class="form-control" type="text" id="username" name="username"
                   placeholder="Unesite korisničko ime" autofocus required/>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold" for="password">Lozinka</label>
            <input class="form-control" type="password" id="password" name="password"
                   placeholder="Unesite lozinku" required/>
        </div>
        <button class="btn btn-primary w-100" type="submit">Prijava</button>
    </form>
</div>
</body>
</html>
