<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Prijava – e-Arhiv</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a365d 0%, #2b6cb0 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-wrapper { width: 100%; max-width: 420px; padding: 1rem; }
        .login-card { background: #fff; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.25); padding: 2.5rem 2rem; }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header .brand { font-size: 2rem; font-weight: 800; color: #1a365d; letter-spacing: 1px; }
        .login-header p { color: #718096; font-size: .9rem; margin-top: .4rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-label { display: block; font-size: .85rem; font-weight: 600; color: #4a5568; margin-bottom: .4rem; }
        .form-control { width: 100%; padding: .6rem .9rem; border: 1px solid #cbd5e0; border-radius: 7px; font-size: 1rem; color: #2d3748; transition: border-color .2s, box-shadow .2s; }
        .form-control:focus { outline: none; border-color: #3182ce; box-shadow: 0 0 0 3px rgba(49,130,206,.18); }
        .btn-submit { width: 100%; padding: .7rem; background: #3182ce; color: #fff; border: none; border-radius: 7px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background .2s; margin-top: .5rem; }
        .btn-submit:hover { background: #2c5282; }
        .alert { padding: .75rem 1rem; border-radius: 7px; margin-bottom: 1.2rem; font-size: .9rem; background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; }
        .divider { border: none; border-top: 1px solid #e2e8f0; margin: 1.5rem 0; }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <div class="brand">e-Arhiv</div>
            <p>Digitalna arhiva e-računa</p>
        </div>
        <div class="alert" th:if="${param.error}">
            Neispravno korisničko ime ili lozinka. Pokušajte ponovo.
        </div>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label class="form-label" for="username">Korisničko ime</label>
                <input class="form-control" type="text" id="username" name="username"
                       placeholder="Unesite korisničko ime" autofocus required/>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Lozinka</label>
                <input class="form-control" type="password" id="password" name="password"
                       placeholder="Unesite lozinku" required/>
            </div>
            <button class="btn-submit" type="submit">Prijava</button>
        </form>
    </div>
</div>
</body>
</html>
