<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Arhiva računa – e-Arhiv</title></head>
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="text-white fw-bold mb-0">Arhiva računa</h2>
        <a href="/racuni/novi" class="btn btn-primary">+ Dodaj račun</a>
    </div>

    <div class="card">
        <div class="card-body">
            <table class="table table-hover align-middle mb-0" th:if="${not #lists.isEmpty(racuni)}">
                <thead>
                <tr>
                    <th>Broj računa</th>
                    <th>Primatelj</th>
                    <th>Datum</th>
                    <th>Iznos</th>
                    <th>Datoteke</th>
                    <th>Akcije</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${racuni}">
                    <td><a class="fw-semibold text-decoration-none" th:href="@{/racuni/{id}(id=${r.id})}" th:text="${r.brojRacuna}">R-001</a></td>
                    <td th:text="${r.primatelj}">Firma d.o.o.</td>
                    <td th:text="${#temporals.format(r.datumIzdavanja, 'dd.MM.yyyy')}">01.01.2024</td>
                    <td class="fw-bold" th:text="${#numbers.formatDecimal(r.iznos, 1, 2) + ' ' + r.valuta}">100,00 EUR</td>
                    <td><span class="badge-custom" th:text="${r.brojDatoteka}">0</span></td>
                    <td>
                        <div class="d-flex gap-2 align-items-center">
                            <a class="btn btn-outline-secondary btn-sm" th:href="@{/racuni/{id}(id=${r.id})}">Detalji</a>
                            <form th:action="@{/racuni/{id}/obrisi(id=${r.id})}" method="post" class="m-0"
                                  onsubmit="return confirm('Jeste li sigurni da želite obrisati ovaj račun?')">
                                <button class="btn btn-danger btn-sm" type="submit">Obriši</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
            <p class="text-muted mb-0" th:if="${#lists.isEmpty(racuni)}">
                Nema pohranjenih računa. <a href="/racuni/novi">Dodajte prvi račun.</a>
            </p>
        </div>
    </div>
</main>
</body>
</html>
