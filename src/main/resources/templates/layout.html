<!DOCTYPE html>
<html th:fragment="layout(content)"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>e-Arhiv</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body {
            min-height: 100vh;
            background-color: #0d1b2e;
            background-image:
                radial-gradient(ellipse at 15% 25%, rgba(37,99,235,.45) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 75%, rgba(109,40,217,.35) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 10%, rgba(6,182,212,.2) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 15%, rgba(16,185,129,.2) 0%, transparent 45%);
            background-attachment: fixed;
        }

        .navbar-glass {
            background: rgba(13,27,46,.85) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,.08);
        }
        .navbar-brand { font-size: 1.3rem; font-weight: 800; color: #93c5fd !important; }
        .nav-link { color: rgba(255,255,255,.8) !important; }
        .nav-link:hover { color: #fff !important; }
        .nav-admin { color: #fde68a !important; }

        .card { border: 1px solid rgba(255,255,255,.07); border-radius: .75rem; box-shadow: 0 4px 24px rgba(0,0,0,.35); background: rgba(255,255,255,.97); }
        .card-header-custom { font-weight: 700; font-size: 1rem; border-bottom: 2px solid #e9ecef; padding-bottom: .6rem; margin-bottom: 1.1rem; color: #1e3a5f; }

        .welcome-hero { background: linear-gradient(135deg, #1e3a5f, #2563eb); color: #fff; border-radius: .75rem; padding: 2.5rem 2rem; margin-bottom: 1.5rem; border: 1px solid rgba(255,255,255,.1); }
        .welcome-hero h1, .welcome-hero p { color: #fff !important; }

        .detail-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; color: #6c757d; font-weight: 700; margin-bottom: .15rem; }
        .detail-value { font-size: .95rem; margin: 0; }

        .table { --bs-table-hover-bg: rgba(37,99,235,.04); }
        .table th { color: #1e3a5f; font-size: .82rem; text-transform: uppercase; letter-spacing: .04em; }

        .badge-custom { background: #dbeafe; color: #1d4ed8; font-size: .72rem; font-weight: 700; padding: .25rem .6rem; border-radius: 20px; }

        .field-error { color: #dc3545; font-size: .8rem; margin-top: .2rem; display: block; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark navbar-glass sticky-top">
    <div class="container-xl">
        <a class="navbar-brand" href="/">e-Arhiv</a>
        <div class="navbar-nav me-auto d-flex flex-row gap-1">
            <a class="nav-link px-3" href="/">Početna</a>
            <a class="nav-link px-3" href="/racuni">Arhiva</a>
            <a class="nav-link px-3 nav-admin" href="/admin"
               sec:authorize="hasAuthority('ROLE_ADMIN')">Admin</a>
        </div>
        <div class="d-flex align-items-center gap-3">
            <a href="/racuni/novi" class="btn btn-primary btn-sm">+ Dodaj račun</a>
            <span class="text-white-50 small px-2 border-start border-secondary" sec:authentication="name"></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button class="btn btn-outline-light btn-sm" type="submit">Odjava</button>
            </form>
        </div>
    </div>
</nav>
<div class="container-xl py-4">
    <th:block th:replace="${content}"/>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
