<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Početna – e-Arhiv</title></head>
<body>
<main>
    <div class="welcome-hero">
        <h1 class="h3 fw-bold mb-2">Dobrodošli u e-Arhiv</h1>
        <p class="mb-0 opacity-75">Digitalna arhiva e-računa — pohranite, pretražite i preuzmite svoje račune na jednom mjestu.</p>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="card-header-custom mb-0">Nedavno dodani računi</h5>
                <a href="/racuni" class="btn btn-outline-primary btn-sm">Prikaži sve →</a>
            </div>
            <table class="table table-hover align-middle mb-0" th:if="${not #lists.isEmpty(nedavniRacuni)}">
                <thead>
                <tr>
                    <th>Broj računa</th>
                    <th>Primatelj</th>
                    <th>Datum izdavanja</th>
                    <th>Iznos</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${nedavniRacuni}">
                    <td class="fw-semibold" th:text="${r.brojRacuna}">R-001</td>
                    <td th:text="${r.primatelj}">Firma d.o.o.</td>
                    <td th:text="${#temporals.format(r.datumIzdavanja, 'dd.MM.yyyy')}">01.01.2024</td>
                    <td class="fw-bold" th:text="${#numbers.formatDecimal(r.iznos, 1, 2) + ' ' + r.valuta}">100,00 EUR</td>
                    <td><a class="btn btn-outline-secondary btn-sm" th:href="@{/racuni/{id}(id=${r.id})}">Detalji</a></td>
                </tr>
                </tbody>
            </table>
            <p class="text-muted mb-0" th:if="${#lists.isEmpty(nedavniRacuni)}">Još nema pohranjenih računa.</p>
        </div>
    </div>
</main>
</body>
</html>
