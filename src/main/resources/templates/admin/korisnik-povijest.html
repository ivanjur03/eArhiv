<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Povijest korisnika – e-Arhiv</title></head>
<body>
<main>
    <div class="d-flex align-items-center gap-3 mb-3">
        <a href="/admin" class="btn btn-outline-light btn-sm">← Natrag</a>
        <h2 class="text-white fw-bold mb-0">
            Upload povijest: <span th:text="${korisnickoIme}">korisnik</span>
        </h2>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="card-header-custom"
                 th:text="'Računi korisnika ' + ${korisnickoIme} + ' (' + ${#lists.size(racuni)} + ')'">Računi</div>
            <table class="table table-hover align-middle mb-0" th:if="${not #lists.isEmpty(racuni)}">
                <thead>
                <tr>
                    <th>Broj računa</th>
                    <th>Izdavatelj</th>
                    <th>Datum izdavanja</th>
                    <th>Iznos</th>
                    <th>Datoteke</th>
                    <th>Učitano</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${racuni}">
                    <td class="fw-semibold" th:text="${r.brojRacuna}">R-001</td>
                    <td th:text="${r.izdavatelj}">Firma d.o.o.</td>
                    <td th:text="${#temporals.format(r.datumIzdavanja, 'dd.MM.yyyy')}">01.01.2024</td>
                    <td class="fw-bold" th:text="${#numbers.formatDecimal(r.iznos, 1, 2) + ' ' + r.valuta}">100,00 EUR</td>
                    <td><span class="badge-custom" th:text="${#lists.size(r.datoteke)}">0</span></td>
                    <td th:text="${r.datumUcitavanja != null ? #temporals.format(r.datumUcitavanja, 'dd.MM.yyyy HH:mm') : '—'}">—</td>
                    <td><a class="btn btn-outline-secondary btn-sm" th:href="@{/racuni/{id}(id=${r.id})}">Detalji</a></td>
                </tr>
                </tbody>
            </table>
            <p class="text-muted mb-0" th:if="${#lists.isEmpty(racuni)}">Ovaj korisnik nema pohranjenih računa.</p>
        </div>
    </div>
</main>
</body>
</html>
