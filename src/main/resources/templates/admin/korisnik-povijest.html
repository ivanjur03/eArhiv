<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::main})}"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Povijest korisnika – e-Arhiv</title></head>
<body>
<main>
    <div style="display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem;">
        <a class="btn btn-secondary btn-sm" href="/admin">← Natrag</a>
        <h2 style="font-size:1.3rem; color:#1a365d;">
            Upload povijest: <strong th:text="${korisnickoIme}">korisnik</strong>
        </h2>
    </div>

    <div class="card">
        <div class="card-title"
             th:text="'Računi korisnika ' + ${korisnickoIme} + ' (' + ${#lists.size(racuni)} + ')'">
            Računi
        </div>
        <table th:if="${not #lists.isEmpty(racuni)}">
            <thead>
            <tr>
                <th>Broj računa</th>
                <th>Izdavatelj</th>
                <th>Datum izdavanja</th>
                <th>Iznos</th>
                <th>Datoteke</th>
                <th>Učitano</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${racuni}">
                <td th:text="${r.brojRacuna}">R-001</td>
                <td th:text="${r.izdavatelj}">Firma d.o.o.</td>
                <td th:text="${#temporals.format(r.datumIzdavanja, 'dd.MM.yyyy')}">01.01.2024</td>
                <td><strong th:text="${#numbers.formatDecimal(r.iznos, 1, 2) + ' ' + r.valuta}">100,00 EUR</strong></td>
                <td><span class="badge badge-blue" th:text="${#lists.size(r.datoteke)}">0</span></td>
                <td th:text="${r.datumUcitavanja != null ? #temporals.format(r.datumUcitavanja, 'dd.MM.yyyy HH:mm') : '—'}">—</td>
                <td><a class="btn btn-sm btn-secondary" th:href="@{/racuni/{id}(id=${r.id})}">Detalji</a></td>
            </tr>
            </tbody>
        </table>
        <p th:if="${#lists.isEmpty(racuni)}" style="color:#718096;">Ovaj korisnik nema pohranjenih računa.</p>
    </div>
</main>
</body>
</html>
